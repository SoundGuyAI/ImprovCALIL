name: ImprovIL Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Lint, Test, and Build Verification Suite
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: "mock-api-key-for-ci-verification"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock-auth-domain.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock-project-id"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock-storage-bucket.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789012:web:mockappid12345"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm test

      - name: Build Production Application
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e
