# Lefthook Git Hooks Configuration
# Enforces deterministic constraints on every local commit for agents and developers.

glob_matcher: doublestar

pre-commit:
  commands:
    prettier:
      glob: "**/*.{js,jsx,ts,tsx,json,css,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "**/*.{js,ts,jsx,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
